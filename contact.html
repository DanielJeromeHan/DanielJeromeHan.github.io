<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Contact | Tanglin Marine Conservation</title>

  <link rel="stylesheet" href="styles/style.css">
  <link
    href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  >
</head>
<style>
  body{
    overflow:hidden;
    background-color: #fff;
    margin:0px;
    background-image: none;
    box-sizing: border-box;
  }
  .menu-toggle {
    margin-top: -18px;
  }
  .boxbox {
    width:100%;
    padding-top:45px;
    height:100%;
    margin:0px;
    border:0px;
    display:flex;
    background:none;
  }
  .contactleft{
    position:fixed;
    width:35%;
    min-width: 35%;
    min-height: 100%;
    z-index: -1;
    height:100%;
     margin-top:-130px;
     background-image:url("images/beach.png");
     background-repeat: no-repeat;
     background-size:cover;
     float:left;
  }
  .contactleft img{
    width:100%;
    height:100%;
  }
  .contactright{
    position:relative;
    background:#fff;
    z-index: 0;
    display:flex;
    flex-direction: column;
    width:65%;
    height:100%;
    margin-top:50px;
    padding-left:50px;
    float:right;
    margin-left:35%;
  }
  input, textarea{
    border:0px;
    border-bottom:1px solid black;
    padding:5px;
  }
  button{
    background-color:#3b3636;
    border:0
  }
  
</style>

<body>
  <header>
    <div class="logo">
      <img src="images/newestlogo.png" alt="Tanglin Marine Conservation logo">
      <div class="logo-title">Tanglin Marine Conservation</div>
    </div>

    <nav aria-label="Main navigation">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>

        <li class="sub-menu">
          <a href="#" aria-haspopup="true">Resources</a>
          <ul>
            <li>
              <a
                href="https://orcanation.org/blog/tanglin-trust-students-lead-coral-conservation-legacy-ocean-reporter-series/?utm_source=ig&utm_medium=social&utm_content=link_in_bio&fbclid=PAc3J0YwZhcHBfaWQMMjU2MjgxMDQwNTU4AAGnirpLx5E_8BBByDdUO_QzuBRNAN2oC7mTDreSb-XWutQNNl3qsR570AsNJ1A&brid=ziFc99WghGt7S55RKnmwdQ"
                target="_blank"
                rel="noopener noreferrer"
              >
                OrcaNation Blog
              </a>
            </li>
            <li>
              <a
                href="https://coralrestoration.org/why-save-coral-reefs/"
                target="_blank"
                rel="noopener noreferrer"
              >
                Coral Restoration
              </a>
            </li>
            <li>
              <a
                href="https://www.wwf.sg/humansofnature/coral-restoration/"
                target="_blank"
                rel="noopener noreferrer"
              >
                World Wildlife Fund
              </a>
            </li>
            <li>
              <a
                href="https://reef-world.org/coral-reef-threats"
                target="_blank"
                rel="noopener noreferrer"
              >
                Reef World Foundation
              </a>
            </li>
          </ul>
        </li>

        <li><a href="team.html">Team</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>

    <button class="menu-toggle" type="button" aria-label="Open navigation menu">
      <i class="fa fa-bars" aria-hidden="true"></i>
    </button>
  </header>

  <main class="boxbox">
    <div class="contactleft" aria-hidden="true"></div>

    <section class="contactright" aria-labelledby="contact-title">
      <h1 id="contact-title">Contact Us</h1>
      <p class="required-note">All fields are required.</p>

      <!--
        SECURITY NOTE:
        Do not use mailto for real contact forms. It exposes addresses, depends on the user's
        email client, and does not provide server-side spam protection.

        Replace /contact-submit with your own HTTPS backend endpoint or a trusted form service.
        Validate and sanitize all fields again on the server.
      -->
      <form
        id="contactForm"
        class="contact-form"
        action="/contact-submit"
        method="post"
        autocomplete="on"
        novalidate
      >
        <div class="honeypot" aria-hidden="true">
          <label>
            Leave this field empty:
            <input
              type="text"
              name="website"
              tabindex="-1"
              autocomplete="off"
            >
          </label>
        </div>

        <label for="name">
          Name:
        </label>
        <br>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Your Name"
          required
          minlength="2"
          maxlength="80"
          autocomplete="name"
        >

        <br><br>

        <label for="email">
          Email:
        </label>
        <br>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          required
          maxlength="120"
          autocomplete="email"
          inputmode="email"
        >

        <br><br>

        <label for="subject">
          Subject:
        </label>
        <br>
        <input
          type="text"
          id="subject"
          name="subject"
          placeholder="My Subject"
          required
          minlength="3"
          maxlength="120"
          autocomplete="off"
        >

        <br><br>

        <label for="message">
          Please write your message below:
        </label>
        <br><br>
        <textarea
          id="message"
          name="message"
          placeholder="Your message"
          required
          minlength="10"
          maxlength="2000"
        ></textarea>

        <br><br>

        <button type="submit">Submit</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    © Copyright 2026
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("contactForm");
      const menuToggle = document.querySelector(".menu-toggle");
      const nav = document.querySelector("header nav");
      const subMenus = document.querySelectorAll("header nav li.sub-menu");

      if (menuToggle && nav) {
        menuToggle.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          nav.classList.toggle("active");

          const expanded = nav.classList.contains("active");
          menuToggle.setAttribute("aria-expanded", String(expanded));
        });
      }

      subMenus.forEach(function (item) {
        const link = item.querySelector("a");

        if (!link) return;

        link.addEventListener("click", function (e) {
          if (window.innerWidth <= 1000) {
            e.preventDefault();
            e.stopPropagation();
            item.classList.toggle("active");
          }
        });
      });

      if (form) {
        form.addEventListener("submit", function (e) {
          const honeypot = form.querySelector('input[name="website"]');

          if (honeypot && honeypot.value.trim() !== "") {
            e.preventDefault();
            return;
          }

          if (!form.checkValidity()) {
            e.preventDefault();
            form.reportValidity();
          }
        });
      }
    });
  </script>
</body>
</html>
